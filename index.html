<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="assets/images/icons/match-icon.svg">
    <link rel="stylesheet" href="assets/styles/css/default.css">

    <script src="scripts/opponent.js" type="module" defer></script>
    <script src="scripts/game.js"  defer></script>
    <script src="scripts/display.js" defer></script>

    <title>NimForJons</title>
</head>
<body>
    <h1>NIM FOR JONS</h1>
    <div id="collection">
        
    </div>

    <input type="radio" id="playerStart" name="first_turn" value="Player">
    <label for="playerStart">Player Starts First</label><br/>
    <input type="radio" id="computerStart" name="first_turn" value="Computer">
    <label for="computerStart">Computer Starts First</label><br/>
    <button id="startButton">Start</button>

    <div id="winLoss">
        <h2>Win/Loss</h2>
        <p id="winLossHistory">0/0</p>
    </div>
    <h2 id="currentTurn">Current Turn: 0</h2>
    <h2 id="currentPlayer">Player's Turn</h2>
    <button id="endTurnButton">End Turn</button>
</body>
</html>
