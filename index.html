<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="assets/images/icons/match-icon.svg">
    <link rel="stylesheet" href="assets/styles/css/default.css">

    <script src="scripts/opponent.js" type="module" defer></script>
    <script src="scripts/game.js" type="module" defer></script>
    <script src="scripts/display.js" type="module" defer></script>

    <title>NimForJons</title>
</head>
<body>
    <h1>NIM FOR JONS</h1>
    <div class="game">
        <div id="collection" class="big-square">

        </div>

        <div class="buttons">
            <input type="radio" id="playerStart" name="first_turn" value="Player">
            <label for="playerStart">Player Starts First</label><br/>
            <input type="radio" id="computerStart" name="first_turn" value="Computer">
            <label for="computerStart">Computer Starts First</label><br/>
            <p><button id="startButton" onClick="startGame()">Start</button></p>
            <p><button id="endTurnButton" onClick="updateCurrentTurn()">End Turn</button></p>
        </div>

        <div class="stats">
            <div id="winLoss" class="contain">
                <h2>Win/Loss</h2>
                <p id="winLossHistory">0/0</p>
            </div>
            <h2 id="currentTurn" class="contain">Current Turn: 0</h2>
            <h2 id="currentPlayer" class="contain">Player's Turn</h2>
        </div>
    </div>
</body>
</html>
